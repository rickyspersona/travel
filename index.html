<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Travel Reports · @Wingman</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f6f1e7 0%, #f0f4f8 100%);
      color: #2c2c2c;
      padding: 20px;
    }
    .container {
      max-width: 640px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      color: #1f4d7a;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin: 0 0 32px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
    }
    a.card {
      display: block;
      padding: 24px;
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    a.card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    a.card.family { border-left: 4px solid #b04a3f; }
    a.card.business { border-left: 4px solid #1f4d7a; }
    .card h2 {
      margin: 0 0 6px;
      font-size: 18px;
    }
    .card.family h2 { color: #b04a3f; }
    .card.business h2 { color: #1f4d7a; }
    .card p {
      margin: 0;
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }
    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌍 Travel Reports</h1>
    <p class="subtitle">兩個子資料夾,各自存放 HTML 旅遊 / 出差報告</p>
    <div class="grid">
      <a href="family-trip/demo.html" class="card family">
        <h2>🏝 Family Trip</h2>
        <p>家庭旅遊報告(沖繩、員旅等)<br>→ 點我看 demo</p>
      </a>
      <a href="business-trip/demo.html" class="card business">
        <h2>💼 Business Trip</h2>
        <p>商務出差報告(客戶拜訪、研討會等)<br>→ 點我看 demo</p>
      </a>
    </div>
    <footer>Generated by @Wingman · <a href="https://github.com/rickyspersona/travel">github.com/rickyspersona/travel</a></footer>
  </div>
</body>
</html>
